name: CI

on:
  push:
    branches: [master, main, "claude/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: file:./prisma/ci.db
      AUTH_SECRET: ci-secret-not-used-anywhere-real-32-byte
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply schema
        run: pnpm db:push --skip-generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build
